name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # The build-time OpenAPI document generation (TimeCalculation.Api.csproj) boots Program.cs's
      # composition root via HostFactoryResolver, which hits the eager PayrollDb connection-string
      # check. Production (the default with no ASPNETCORE_ENVIRONMENT set) has no committed
      # connection string by design; Development's is safe to commit (localhost-only, see
      # appsettings.Development.json) and is what lets a bare `dotnet build` succeed here.
      ASPNETCORE_ENVIRONMENT: Development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore RobTime.sln

      # No live Postgres in this job: TimeCalculationTests only touches PayrollDbContext via
      # PersistenceModelTests, which builds the EF model against the Npgsql provider without
      # connecting (see TimeCalculation.Persistence/README.md) — the whole suite is DB-free.
      - name: Build (warnings as errors)
        run: dotnet build RobTime.sln --no-restore --configuration Release -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test RobTime.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"
